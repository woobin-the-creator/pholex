# ─────────────────────────────────────────────────────────────────────────────
# Pholex 운영(prod) Nginx 설정 — HTTPS 종단(TLS termination)
#
# 인증서 파일 2개만 아래 경로에 넣으면 동작해요 (이름까지 맞추면 이 파일 수정 불필요):
#   docker/nginx/certs/pholex.crt   ← fullchain (서버 인증서 + 중간 CA), 사내 CA 발급
#   docker/nginx/certs/pholex.key   ← 개인키
# 이름이 다르면 아래 ssl_certificate / ssl_certificate_key 경로만 바꾸세요.
#
# server_name 은 실제 서비스 도메인으로 교체하세요 (예: pholex.internal).
# ─────────────────────────────────────────────────────────────────────────────

upstream backend {
    server backend:8000;
}

# HTTP(80) → HTTPS(443) 강제 리다이렉트
server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
}

# HTTPS(443)
server {
    listen 443 ssl;
    http2 on;
    server_name _;   # 실제 도메인으로 교체 권장 (예: pholex.internal)

    ssl_certificate     /etc/nginx/certs/pholex.crt;
    ssl_certificate_key /etc/nginx/certs/pholex.key;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;

    # WebSocket: /ws → backend (Upgrade 헤더 필수)
    location /ws {
        proxy_pass http://backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
    }

    # REST: /api → backend
    location /api/ {
        proxy_pass http://backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SPA 정적 파일: 빌드된 frontend/dist 를 nginx 가 직접 서빙
    # (frontend_dist 볼륨 마운트 — docker-compose.prod.yml 참고)
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;   # SPA 클라이언트 라우팅 fallback
    }
}
