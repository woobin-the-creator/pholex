# backend/frontend 업스트림은 upstream{}(기동 시 1회 resolve) 대신 Docker 내장 DNS로
# 요청마다 재resolve 한다 — 컨테이너 재생성으로 IP가 바뀌어도 옛 IP를 물고 502 내지 않게.
server {
    listen 80;
    server_name localhost;

    # Docker 내장 DNS — proxy_pass 에 변수를 쓰면 nginx가 요청 시점에 재resolve 한다.
    resolver 127.0.0.11 valid=10s ipv6=off;

    # WebSocket: /ws → backend (Upgrade 헤더 필수)
    location /ws {
        set $backend backend:8000;
        proxy_pass http://$backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
    }

    # REST: /api → backend
    location /api/ {
        set $backend backend:8000;
        proxy_pass http://$backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Vite dev server HMR — needs WS upgrade too
    location / {
        set $frontend frontend:5173;
        proxy_pass http://$frontend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
