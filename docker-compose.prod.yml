# ─────────────────────────────────────────────────────────────────────────────
# Pholex 운영(prod) 오버레이 — 실사용자 대상 HTTPS 서비스
#
#   base(docker-compose.yml) + 이 파일 을 함께 올려 운영 스택을 띄웁니다.
#   실행:  scripts/deploy.sh --prod   (frontend 빌드 → 스택 기동까지 한 번에)
#
# dev 와 차이:
#   - nginx 가 80/443 을 열고 HTTPS 종단(prod.conf + 사내 CA 인증서)
#   - frontend 는 Vite dev 서버가 아니라, 빌드된 정적 파일(dist)을 nginx 가 직접 서빙
#   - backend 는 --reload 없이 멀티 워커 + SSO(real) 의존 인프라(Redis, IdP cert)
#   - 별도 prod 볼륨(pg_data_prod, redis_data_prod) 사용
#
# 사내 특화값은 .env.prod 로 주입합니다 (커밋 금지):
#   HTTPS_PORT=10004        # 사내 host 포트(외부 LB가 :443 → host:10004 라우팅)
#   DOCKER_REGISTRY=...     # 사내 Docker 레지스트리 미러
#   REDIS_URL, APP_BASE_URL, SSO_CERT_PATH 등
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"     # 사내: HTTPS_PORT=10004 → "10004:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully   # dist 복사 완료 후 nginx 기동
    volumes: !override
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - frontend_dist:/usr/share/nginx/html:ro

  frontend:
    # 운영에서는 dev 서버를 띄우지 않고, 미리 빌드된 dist 를 공유 볼륨에 복사만 하고 종료.
    # (frontend/dist 는 scripts/deploy.sh --prod 가 배포 전에 npm run build 로 생성)
    build: !reset null
    image: ${DOCKER_REGISTRY:-}alpine:3.20
    command: sh -c "cp -R /built-dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend/dist:/built-dist:ro
      - frontend_dist:/frontend_dist

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 3
    environment:
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      # SSO(real) 의존: nonce/세션 저장용 Redis, IdP id_token RS256 검증용 공개 인증서
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      SSO_CERT_PATH: ${SSO_CERT_PATH:-/app/certs/sso.cert}
      APP_BASE_URL: ${APP_BASE_URL:-}
      SSO_RETURN_URL: ${SSO_RETURN_URL:-/}
      # IdP/세션 값은 .env.prod 에 있어도, 여기 environment: 에 명시해야 컨테이너에 주입된다.
      # (deploy.sh 의 --env-file 은 compose 의 ${VAR} 치환용일 뿐 컨테이너 주입이 아님.)
      # 누락 시 config.py 기본값(빈 client_id 등)으로 폴백 → authorize URL 깨짐 → callback 미도달 → 무한 리다이렉트.
      IDP_LOGIN_URL: ${IDP_LOGIN_URL:-}
      IDP_LOGOUT_URL: ${IDP_LOGOUT_URL:-}
      IDP_CLIENT_ID: ${IDP_CLIENT_ID:-}
      IDP_JWKS_URI: ${IDP_JWKS_URI:-}
      JWT_SECRET: ${JWT_SECRET:-}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ADMIN_EMAILS: ${ADMIN_EMAILS:-}
    volumes:
      # IdP 공개 인증서(sso.cert)를 backend 컨테이너에 마운트 (host certs/ 는 gitignore).
      - ./certs:/app/certs:ro
    depends_on:
      - postgres
      - redis

  redis:
    image: ${DOCKER_REGISTRY:-}redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  postgres:
    volumes: !override
      - pg_data_prod:/var/lib/postgresql/data

volumes:
  frontend_dist:
  pg_data_prod:
  redis_data_prod:
