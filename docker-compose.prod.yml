# ─────────────────────────────────────────────────────────────────────────────
# Pholex 운영(prod) 오버레이 — 실사용자 대상 HTTPS 서비스
#
#   base(docker-compose.yml) + 이 파일 을 함께 올려 운영 스택을 띄웁니다.
#   실행:  scripts/deploy.sh --prod   (frontend 빌드 → 스택 기동까지 한 번에)
#
# dev 와 차이:
#   - nginx 가 80/443 을 열고 HTTPS 종단(prod.conf + 사내 CA 인증서)
#   - frontend 는 Vite dev 서버가 아니라, 빌드된 정적 파일(dist)을 nginx 가 직접 서빙
#   - backend 는 --reload 없이 멀티 워커 + SSO(real) 의존 인프라(Redis, IdP cert)
#   - 별도 prod 볼륨(pg_data_prod, redis_data_prod) 사용
#
# 사내 특화값은 .env.prod 로 주입합니다 (커밋 금지):
#   HTTPS_PORT=10004        # 사내 host 포트(외부 LB가 :443 → host:10004 라우팅)
#   DOCKER_REGISTRY=...     # 사내 Docker 레지스트리 미러
#   REDIS_URL, APP_BASE_URL, SSO_CERT_PATH 등
# ─────────────────────────────────────────────────────────────────────────────

services:
  nginx:
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${HTTPS_PORT:-443}:443"     # 사내: HTTPS_PORT=10004 → "10004:443"
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_completed_successfully   # dist 복사 완료 후 nginx 기동
    volumes: !override
      - ./docker/nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./docker/nginx/certs:/etc/nginx/certs:ro
      - frontend_dist:/usr/share/nginx/html:ro

  frontend:
    # 운영에서는 dev 서버를 띄우지 않고, 미리 빌드된 dist 를 공유 볼륨에 복사만 하고 종료.
    # (frontend/dist 는 scripts/deploy.sh --prod 가 배포 전에 npm run build 로 생성)
    build: !reset null
    image: ${DOCKER_REGISTRY:-}alpine:3.20
    command: sh -c "cp -R /built-dist/. /frontend_dist/"
    restart: "no"
    volumes:
      - ./frontend/dist:/built-dist:ro
      - frontend_dist:/frontend_dist

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers 3
    # .env.prod 의 모든 키를 컨테이너 환경에 직접 주입한다(footgun 근본 차단).
    # ── 왜 env_file 인가 ──
    # deploy.sh 의 `--env-file` 은 compose 파일 안의 ${VAR} 치환용일 뿐 컨테이너로 주입하지 않는다.
    # 예전에는 SSO/세션 값마다 environment: 에 ${VAR} 패스스루를 일일이 나열해야 했고,
    # 새 변수를 .env.prod 에 추가하고 여기 추가를 깜빡하면 빈값으로 폴백돼
    # 무한 리다이렉트(빈 client_id) 같은 장애가 났다(IDP_*, SESSION_COOKIE_NAME 등 3회 재발).
    # env_file 은 .env.prod 의 키 전부를 자동 주입하므로 더는 나열이 필요 없다 —
    # 새 SSO/세션 변수는 .env.prod 에만 추가하면 컨테이너까지 그대로 도달한다.
    env_file:
      - .env.prod
    environment:
      # 아래는 .env.prod 에 없을 때를 위한 "운영 기본값"만 남긴다.
      # environment: 가 env_file 보다 우선하지만, .env.prod 에 같은 키가 있으면
      # ${VAR:-기본값} 가 그 값으로 치환되므로 결과는 동일하다(덮어쓰기 아님, 폴백).
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}   # 운영=HTTPS → Secure 쿠키
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}            # nonce 저장용
      SSO_CERT_PATH: ${SSO_CERT_PATH:-/app/certs/sso.cert}     # IdP id_token RS256 검증 인증서
      SSO_RETURN_URL: ${SSO_RETURN_URL:-/}                     # 로그인 후 복귀 경로
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}                   # 세션 JWT 서명 알고리즘
    # .env.prod 에 반드시 있어야 하는 키(누락 시 빈값 → 로그인 실패. env_file 로 자동 주입):
    #   IDP_LOGIN_URL, IDP_LOGOUT_URL, IDP_CLIENT_ID, IDP_JWKS_URI,
    #   APP_BASE_URL(redirect_uri 기준), JWT_SECRET, ADMIN_EMAILS  — 상세: docs/auth.md
    volumes:
      # IdP 공개 인증서(sso.cert)를 backend 컨테이너에 마운트 (host certs/ 는 gitignore).
      - ./certs:/app/certs:ro
    depends_on:
      - postgres
      - redis

  redis:
    image: ${DOCKER_REGISTRY:-}redis:7-alpine
    command: redis-server --appendonly yes
    volumes:
      - redis_data_prod:/data

  postgres:
    volumes: !override
      - pg_data_prod:/var/lib/postgresql/data

volumes:
  frontend_dist:
  pg_data_prod:
  redis_data_prod:
