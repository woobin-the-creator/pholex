services:
  nginx:
    ports:
      # host 발행 포트 10014 — 사내 방화벽이 외부에 10000~20만 개방 + prod nginx=10004 회피.
      # 환경 무관 단일 값(미스매치 부채 제거). 상세 근거: history/decisions.html
      - "10014:80"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8081:8000"
    volumes:
      - ./backend/app:/app/app
    # .env.dev 의 모든 키를 컨테이너에 직접 주입한다(prod 와 동일한 footgun 차단).
    # FAKE_LOT_SOURCE, SESSION_COOKIE_NAME(=pholex_dev_session) 등 dev 전용 키가
    # environment: 누락으로 컨테이너에 안 닿던 문제를 env_file 이 일괄 해결한다.
    env_file:
      - .env.dev
    environment:
      # bypass 로그인 사번 — ADAPTER_MODE=real 실데이터 검증 시 .env.dev 로 실 hold 사번 주입.
      # prod(DEV_SSO_BYPASS=false)에선 무시됨. dev 전용이라 base 가 아닌 여기 둠.
      DEV_USER_EMPLOYEE_NUMBER: ${DEV_USER_EMPLOYEE_NUMBER:-99999}
    extra_hosts:
      # ADAPTER_MODE=real 검증 시 host 의 실데이터 postgres 접근(DATABASE_URL=host.docker.internal).
      - "host.docker.internal:host-gateway"

  frontend:
    ports:
      - "8082:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    ports:
      - "5433:5432"

volumes:
  frontend_node_modules:
