services:
  nginx:
    ports:
      - "8080:80"

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8081:8000"
    volumes:
      - ./backend/app:/app/app

  frontend:
    ports:
      - "8082:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules

  postgres:
    ports:
      - "5433:5432"

volumes:
  frontend_node_modules:
