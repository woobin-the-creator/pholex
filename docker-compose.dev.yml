services:
  nginx:
    ports:
      - "8080:80"
    volumes:
      - ./docker/nginx/dev.conf:/etc/nginx/conf.d/default.conf:ro

  frontend:
    command: npm run dev -- --host 0.0.0.0 --port 5173
    ports:
      - "8082:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

  backend:
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8081:8000"
    volumes:
      - ./backend:/app

  postgres:
    ports:
      - "5433:5432"
