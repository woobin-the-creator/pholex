<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pholex — 의사결정 기록 (Decision Log)</title>
<style>
  :root {
    --bg: #0a0c0f;
    --bg-soft: #11151a;
    --panel: #151a21;
    --panel-edge: rgba(140, 170, 210, 0.14);
    --ink: #e8edf3;
    --ink-soft: #9aa6b4;
    --ink-faint: #5f6b78;
    --accent: #6ea8fe;
    --accent-soft: rgba(110, 168, 254, 0.16);
    --done: #5fd0a0;
    --done-soft: rgba(95, 208, 160, 0.14);
    --future: #d6a35f;
    --future-soft: rgba(214, 163, 95, 0.14);
    --revisit: #c77dff;
    --revisit-soft: rgba(199, 125, 255, 0.14);
    --line: rgba(140, 170, 210, 0.18);
    --radius: 14px;
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    --mono: "SF Mono", "JetBrains Mono", "Fira Code", ui-monospace, Menlo, monospace;
  }
  body[data-theme="light"] {
    --bg: #f4f6f8;
    --bg-soft: #ffffff;
    --panel: #ffffff;
    --panel-edge: rgba(40, 70, 110, 0.12);
    --ink: #1a2230;
    --ink-soft: #4a5664;
    --ink-faint: #8a96a4;
    --accent: #2f6fe0;
    --accent-soft: rgba(47, 111, 224, 0.10);
    --done: #1f9e6e;
    --done-soft: rgba(31, 158, 110, 0.10);
    --future: #b07820;
    --future-soft: rgba(176, 120, 32, 0.10);
    --revisit: #8b3fd6;
    --revisit-soft: rgba(139, 63, 214, 0.10);
    --line: rgba(40, 70, 110, 0.16);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    transition: background 0.4s ease, color 0.4s ease;
  }
  .wrap { max-width: 920px; margin: 0 auto; padding: 56px 24px 120px; }

  /* Header */
  header.page {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 24px;
    margin-bottom: 8px;
  }
  .title-block h1 {
    font-size: 30px;
    font-weight: 650;
    letter-spacing: -0.02em;
    margin: 0 0 6px;
  }
  .title-block .sub {
    color: var(--ink-soft);
    font-size: 14.5px;
    margin: 0;
    max-width: 560px;
  }
  .theme-btn {
    flex: none;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    color: var(--ink-soft);
    border-radius: 999px;
    padding: 8px 16px;
    font-size: 13px;
    cursor: pointer;
    font-family: var(--font);
    transition: all 0.2s ease;
  }
  .theme-btn:hover { color: var(--ink); border-color: var(--accent); }

  /* Legend / filters */
  .legend {
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
    margin: 28px 0 8px;
  }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 13px;
    border-radius: 999px;
    font-size: 12.5px;
    font-weight: 500;
    border: 1px solid var(--panel-edge);
    background: var(--panel);
    color: var(--ink-soft);
    cursor: pointer;
    user-select: none;
    transition: all 0.18s ease;
  }
  .chip[aria-pressed="true"] { color: var(--ink); border-color: currentColor; }
  .chip.is-dimmed { opacity: 0.38; }
  .dot { width: 9px; height: 9px; border-radius: 50%; flex: none; }
  .dot.done { background: var(--done); }
  .dot.future { background: var(--future); }
  .dot.revisit { background: var(--revisit); }

  /* Timeline */
  .timeline { position: relative; margin-top: 40px; padding-left: 30px; }
  .timeline::before {
    content: "";
    position: absolute;
    left: 7px; top: 6px; bottom: 6px;
    width: 2px;
    background: linear-gradient(to bottom, transparent, var(--line) 8%, var(--line) 92%, transparent);
  }
  .era {
    position: relative;
    margin: 0 0 14px -30px;
    padding-left: 30px;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink-faint);
  }
  .era:not(:first-child) { margin-top: 34px; }

  .node { position: relative; margin-bottom: 16px; }
  .node::before {
    content: "";
    position: absolute;
    left: -27px; top: 22px;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--bg);
    border: 2px solid var(--accent);
    box-shadow: 0 0 0 4px var(--bg);
    z-index: 2;
  }
  .node[data-status="done"]::before { border-color: var(--done); }
  .node[data-status="future"]::before { border-color: var(--future); }
  .node[data-status="revisit"]::before { border-color: var(--revisit); }
  .node.is-hidden { display: none; }

  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--panel-edge);
    border-radius: var(--radius);
    overflow: hidden;
    transition: border-color 0.25s ease, transform 0.25s ease;
  }
  .card::before {
    content: "";
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent);
    opacity: 0.55;
  }
  .node[data-status="done"] .card::before { background: var(--done); }
  .node[data-status="future"] .card::before { background: var(--future); }
  .node[data-status="revisit"] .card::before { background: var(--revisit); }
  .card:hover { border-color: var(--accent); transform: translateX(2px); }

  .card-head {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 18px;
    cursor: pointer;
  }
  .card-head .meta { flex: 1; min-width: 0; }
  .card-head .when {
    font-family: var(--mono);
    font-size: 11.5px;
    color: var(--ink-faint);
    letter-spacing: 0.02em;
  }
  .card-head h3 {
    margin: 2px 0 0;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
  }
  .badge {
    flex: none;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 999px;
  }
  .badge.done { background: var(--done-soft); color: var(--done); }
  .badge.future { background: var(--future-soft); color: var(--future); }
  .badge.revisit { background: var(--revisit-soft); color: var(--revisit); }
  .caret { flex: none; color: var(--ink-faint); transition: transform 0.25s ease; font-size: 13px; }
  .node.is-open .caret { transform: rotate(90deg); }

  .card-body {
    display: grid;
    grid-template-rows: 0fr;
    transition: grid-template-rows 0.3s ease;
  }
  .node.is-open .card-body { grid-template-rows: 1fr; }
  .card-body > .inner { overflow: hidden; }
  .body-pad { padding: 0 18px 18px; }

  .decision-line {
    font-size: 14.5px;
    color: var(--ink);
    padding: 2px 0 12px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 12px;
  }
  .field { margin-bottom: 11px; }
  .field:last-child { margin-bottom: 0; }
  .field .label {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink-faint);
    margin-bottom: 3px;
  }
  .field .val { font-size: 13.5px; color: var(--ink-soft); }
  .field .val code {
    font-family: var(--mono);
    font-size: 12px;
    background: var(--accent-soft);
    color: var(--accent);
    padding: 1px 6px;
    border-radius: 5px;
  }
  .alts { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 3px; }
  .alt {
    font-size: 12px;
    padding: 3px 9px;
    border-radius: 7px;
    background: var(--bg-soft);
    border: 1px solid var(--line);
    color: var(--ink-soft);
  }
  .alt s { color: var(--ink-faint); }

  footer.page {
    margin-top: 56px;
    padding-top: 22px;
    border-top: 1px solid var(--line);
    color: var(--ink-faint);
    font-size: 12.5px;
  }
  footer.page code { font-family: var(--mono); color: var(--ink-soft); }
  .updated { color: var(--ink-soft); }
</style>
</head>
<body data-theme="dark">
<div class="wrap">
  <header class="page">
    <div class="title-block">
      <h1>Pholex 의사결정 기록</h1>
      <p class="sub">아키텍처와 framework를 왜 이렇게 골랐는지 헷갈리지 않도록 모아둔 decision log예요. 굵직한 결정을 내릴 때마다 여기에 추가돼요.</p>
    </div>
    <button class="theme-btn" id="themeBtn">◐ Light</button>
  </header>

  <div class="legend" id="legend">
    <span class="chip" data-filter="done" aria-pressed="true"><span class="dot done"></span>확정 (Decided)</span>
    <span class="chip" data-filter="future" aria-pressed="true"><span class="dot future"></span>예정 (Planned)</span>
    <span class="chip" data-filter="revisit" aria-pressed="true"><span class="dot revisit"></span>재검토 (Revisit)</span>
  </div>

  <div class="timeline" id="timeline"></div>

  <footer class="page">
    <p class="updated" id="updatedAt"></p>
    <p>이 파일은 <code>history/decisions.html</code> 이고, 모든 결정은 파일 상단 <code>DECISIONS</code> 배열에 들어 있어요.
       새 결정을 추가하려면 배열에 객체 하나만 넣으면 timeline에 자동으로 그려져요.
       상태값은 <code>done</code> / <code>future</code> / <code>revisit</code> 중 하나예요.</p>
  </footer>
</div>

<script>
  /* ─────────────────────────────────────────────────────────────
     의사결정 데이터 — 새 결정이 생기면 이 배열에 객체를 추가하세요.
     era 순서대로 위→아래로 그려지고, 같은 era 안에서는 배열 순서대로 놓여요.
     status: "done"(확정) | "future"(예정) | "revisit"(언젠가 재검토)
     fields: rationale(왜), alternatives(대안 — name + rejected 이유), note(부가설명)
     ───────────────────────────────────────────────────────────── */
  const LAST_UPDATED = "2026-06-13 (슬롯[5] 키워드 Hold 설계 확정 + 알람 박스: critical 순간 팝)";

  const DECISIONS = [
    // ─── ERA 1: 기반 설계 ───
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "프로젝트 킥오프",
      status: "done",
      title: "Hexagonal Architecture (Ports & Adapters)",
      decision: "domain / usecases / ports 를 core로 두고, 데이터 소스는 adapter로 갈아끼우는 구조를 채택했어요.",
      rationale: "데이터 소스가 '복합/미정'이라 처음부터 한 곳에 묶으면 안 됐어요. fake adapter로 먼저 개발·테스트하고, 사내 real adapter는 나중에 같은 port에 꽂기만 하면 되도록 격리했어요.",
      alternatives: [
        { name: "Layered(3-tier) 단순 구조", rejected: "데이터 소스 교체 시 비즈니스 로직까지 흔들림" },
        { name: "core에 DB 직접 의존", rejected: "fake/real 전환 불가, 테스트 어려움" }
      ],
      note: "ADAPTER_MODE=fake|real 로 런타임 전환. domain/usecases/api/ports 는 CI gate로 사내 AI가 못 건드리게 보호돼요."
    },
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "킥오프",
      status: "done",
      title: "Frontend: React + Vite + TypeScript",
      decision: "React 19 + Vite 7 + TypeScript 5.9 조합으로 frontend를 구성했어요.",
      rationale: "팀 기존 React 역량, TanStack Table·Jotai 같은 핵심 library의 1급 지원, Vite의 즉시 HMR.",
      alternatives: [
        { name: "Vue 3", rejected: "사내 React 경험 부재 시 전환 비용 큼" },
        { name: "Svelte", rejected: "생태계 협소, TanStack Table 공식 지원 불안정" }
      ]
    },
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "킥오프",
      status: "done",
      title: "State 관리: Jotai (Zustand 아님)",
      decision: "atomFamily(tableId) 패턴으로 6개 테이블 state를 구조적으로 분리했어요.",
      rationale: "테이블 0 업데이트가 테이블 1~5의 리렌더를 유발하지 않는 게 보장돼야 했어요. atom effect로 WebSocket 이벤트를 해당 테이블 atom에 직접 연결할 수 있어요.",
      alternatives: [
        { name: "Zustand", rejected: "selector 미사용 시 store 전체 구독 → 6개 테이블 동반 리렌더 위험" },
        { name: "Redux Toolkit", rejected: "boilerplate 과도, WebSocket middleware 별도 필요" }
      ]
    },
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "킥오프",
      status: "done",
      title: "테이블: TanStack Table v8",
      decision: "headless table library로 TanStack Table v8을 골랐어요.",
      rationale: "완전 headless·무료·가상 스크롤 내장. SheetJS 조합으로 Excel 내보내기를 직접 구현하고 디자인을 자유롭게 입힐 수 있어요.",
      alternatives: [
        { name: "AG Grid Community", rejected: "Excel 내보내기·행 그룹핑이 Enterprise 전용(유료)" },
        { name: "react-table v7", rejected: "headless 아님, 스타일 커스텀 어려움" }
      ]
    },
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "킥오프",
      status: "done",
      title: "Backend: FastAPI + SQLAlchemy 2.0 async",
      decision: "FastAPI + SQLAlchemy async + asyncpg + Pydantic v2 + Alembic 스택을 채택했어요.",
      rationale: "Pydantic으로 WebSocket 메시지 스키마 자동 검증, OpenAPI 자동 문서화, Redis pub/sub 직접 통합으로 channel layer 없이 멀티워커 broadcast.",
      alternatives: [
        { name: "Django + Channels", rejected: "channel layer 추상화 레이어가 추가로 붙음" },
        { name: "Node.js / Express", rejected: "팀 Python 역량 우선" }
      ]
    },
    {
      era: "1 · 기반 설계 (Foundation)",
      when: "킥오프",
      status: "done",
      title: "인프라: Redis + Docker Swarm + Nginx",
      decision: "세션/캐시/pub-sub은 Redis, 오케스트레이션은 Docker Swarm, reverse proxy는 Nginx로 정했어요.",
      rationale: "Redis 하나로 pub/sub + 세션 + 쿼리 캐시. Swarm은 소규모 베어메탈(2~5노드)에서 Compose 문법을 재사용하면서 rolling update가 돼요.",
      alternatives: [
        { name: "Kubernetes / K3s", rejected: "베어메탈에서 control plane·CNI 운영 인력 과도" },
        { name: "Memcached", rejected: "Pub/Sub 없어 WebSocket broadcast 불가" }
      ]
    },

    // ─── ERA 2: MVP 구현 ───
    {
      era: "2 · MVP 구현",
      when: "MVP 초기",
      status: "revisit",
      title: "MVP 한정 SQLite stand-in",

      alternatives: [
        { name: "처음부터 Postgres", rejected: "극초기엔 컨테이너 띄우는 부담을 줄이고 싶었음" }
      ],
      note: "SQLite는 멀티 워커 동시 쓰기에 부적합 → 운영은 Postgres. .env.dev 의 DATABASE_URL이 아직 SQLite라 Postgres로 교정 예정이에요."
    },
    {
      era: "2 · MVP 구현",
      when: "MVP",
      status: "done",

      decision: "랏 데이터는 사내 REST API를 우선으로, 안 되면 Python 라이브러리를 fallback으로 읽어요.",

      alternatives: [
        { name: "MES/EAP DB 직접 조회", rejected: "접근 권한·스키마 결합도가 너무 큼 (추후 adapter로 추가 가능)" }
      ]
    },
    {
      era: "2 · MVP 구현",
      when: "MVP",
      status: "done",
      title: "fake/real adapter 분리 + 사내 AI 위임",
      decision: "fake adapter는 우리가 짜고, real adapter는 사내 AI가 같은 구조로 미러링하도록 ai-prompts/ 명세로 위임해요.",

      era: "3 · UX · 디자인",

    },
    {

        { name: "노트북 8080 / 사내 10014 환경 분기(env 변수)", rejected: "두 값이 어긋나 '어느 게 맞나/왜 다른가'를 반복 추적 → 인지 부채. 충돌 escape hatch 실익도 희박(사내 dev=10014/prod=10004 비충돌, 노트북 10014 점유 희박)" },
        { name: "리터럴 대신 ${DEV_HTTP_PORT:-10014} env 기본값", rejected: "'이 변수 어디서 세팅되나' 류의 새 의심을 심음 — 단일 진실 원칙 약화" }
      ],
      note: "host 발행 포트만 변경(컨테이너 listen 80·dev.conf 불변). 외부 노출은 nginx 1개로 충분(dev.conf가 /·/api·/ws 단일 포트 커버). IP 접속이라 Vite 7 allowedHosts 우회 불필요(IP 리터럴 기본 허용). 함께: backend.environment 에 DEV_USER_EMPLOYEE_NUMBER 주입(dev override) + python-multipart 를 backend/Dockerfile 설치 목록에 추가(pyproject 와 동기화 — SSO callback Form 파싱). 갱신: docker-compose.dev.yml, scripts/deploy.sh, docs/infra.md, docs/onprem-setup.md. 과거 기록물(ai-prompts/260527 핸드오프, .omc/plans)은 시간선 보존 위해 미변경."
    },
    {
      era: "4 · 안정화 · 진행 중",
      when: "2026-06-13",
      status: "future",
      title: "슬롯[5] 'Special hold' = 키워드 기반 hold 모니터 (watchlist 보류, 키워드 매칭으로 전환)",
      decision: "placeholder 슬롯[5] 'Special hold'(SPC/FDC 등 특정 hold code)를 사용자 정의 키워드로 일반화해요. 유저가 (필드, 값) 키워드를 해시태그처럼 등록·저장하고, lot_status에서 매칭되는 lot을 보여줘요. '내 lot hold'(사번 매칭)의 자매 슬롯 — 매칭 기준만 키워드, 단 status 무관 전체 lot 우주가 대상. 필드는 equipment/process_step/hold_comment/lot_id(대소문자무시 substring) + status(exact, distinct 동적 선택지). 여러 키워드는 DNF(그룹 안 AND, 그룹끼리 OR)로 조합. 결과는 lot_id dedup + updated_at DESC + 100건 offset 페이지네이션. 저장은 유저별 명명 프리셋(keyword_presets 신규, config JSONB) + 드래프트/명시저장. 데이터 소스는 lot_status 30분 캐시(실시간 아님), 수동 새로고침.",
      rationale: "데이터플로우 옵션(watchlist '내 관심 랏')은 보류하고 더 일반적인 키워드 모니터로 방향을 틀었어요. lot_status가 pholex 자체 Postgres라 real adapter까지 외부에서 전부 구현 가능 — 사내 위임 불필요한 자기완결 기능이에요. status는 열린 집합(2026-06-09 결정)이라 선택지를 distinct로 동적 생성하고 exact 매칭해요(substring이면 Active가 PreActive를 오매칭). 키워드 구성은 항상 프리셋 단위로 통째 읽고/써서 정규화 대신 JSONB 문서. my-hold(한 사람 holds)와 달리 키워드는 수천 행을 잡을 수 있어 페이지네이션이 필수예요.",
      alternatives: [
        { name: "watchlist '내 관심 랏'(lot_id 수동 등록) 계속", rejected: "보류 — 키워드 매칭이 더 일반적이고 실시간 의존도 없음" },
        { name: "전역 OR/AND 토글(혼합 불가)", rejected: "'특정 키워드끼리 AND'를 표현 못 함 — DNF 필요" },
        { name: "status 선택지 하드코딩 enum", rejected: "열린 집합 결정과 충돌, 미래 status 값 누락" },
        { name: "필드 '전체 텍스트' 기본값 허용", rejected: "필드 강제 지정으로 노이즈·모호성 제거(사용자 선택)" },
        { name: "프리셋 정규화 테이블(조건 1행)", rejected: "개별 조건 SQL 질의 불필요 — JSONB 문서가 원자적·단순" },
        { name: "행별 매칭 키워드 배지 v1 포함", rejected: "DNF 구조 보존 시 나중에 additive로 싸게 추가 → v2" }
      ],
      note: "설계 문서: docs/special-hold-keyword.md (grill-me 12문 합의). 위치 slotIndex 4(표시 05), 이름 Special hold 유지(부제만 갱신). 신규 테이블 keyword_presets(employee_number, name, config JSONB, is_default; UNIQUE(employee_number,name)). 백엔드: KeywordPresetRepository 포트 + LotRepository.search(dnf, limit, offset)→(rows,total) + usecases(List/Save/Delete/SearchSpecialHold) + /api/keyword-presets, fake-first TDD → real(pholex Postgres). 쿼리빌더는 그룹 predicate 개별 접근 유지(v2 배지 보험). status=future(설계 확정, 백엔드 착수 중). v2 연기: 매칭 배지·일반 field:value 문법·자동 폴링."
    },
    {
      era: "4 · 안정화 · 진행 중",
      when: "2026-06-13",
      status: "done",
      title: "알람 박스(notification dock): critical 순간 팝 + localStorage 적립",
      decision: "데이터 변경(새 row/삭제/컬럼 변경)을 좌측 사이드바 'Lot tracking' 자리의 알람 박스에 적립해요. critical(→hold)은 sonner 순간 팝(~10초)으로 시선을 끈 뒤 적립, info는 팝 없이 직행. 백엔드가 이미 보내던 change/alert WS 메시지를 재사용하고(프론트가 버리고 있었음), 순수 적립 로직(dedup·상한 50·읽음)은 atoms/alarmStore.ts로 분리해 단위 테스트했어요. 적립분은 localStorage 영속.",
      rationale: "이 도구의 본질은 '내 랏이 hold 걸렸나' 감시라, critical은 놓치면 안 돼요(팝) — 하지만 30분 dump로 변경이 몰려 오므로 떴다 사라지는 토스트만으론 놓친 걸 못 봐요. 그래서 '안 사라지는 dock'에 누적하고 새로고침에도 살아남게 영속화했어요(백엔드는 과거 이벤트를 replay 안 하므로 클라이언트가 유일한 기록). critical은 오직 alert로만 와서 alert wire에 eventId/occurredAt이 빠져 있던 걸 4줄로 보강(dedup·정렬 기둥).",
      alternatives: [
        { name: "프론트에서 직접 row diff", rejected: "백엔드가 이미 계산하는 change 스트림 중복 구현 + 스냅샷 교체라 두 푸시 사이 변경 유실" },
        { name: "안 사라지는 sonner 토스트 더미", rejected: "코너에 쌓여 테이블을 가림 — dock(접으면 배지 하나)이 dock-bar 모델에 맞음" },
        { name: "메모리(Jotai)만, 비영속", rejected: "실수로 F5 한 번에 놓친 critical 증발 → 기능 목적 붕괴" },
        { name: "랏별 묶음 2단 아코디언", rejected: "30분 배치라 dump당 랏당 1이벤트 → 묶음 압축 이득 거의 0, 시간순 평면 로그가 배치 리듬에 더 맞음" }
      ],
      note: "TDD로 구현(store 6 + parse 3 + dock 통합 3 = 신규 12 테스트, 기존 그린 유지). sonner +1 의존성(critical 팝 전용, 무의존 철학에서 1회 예외). 항목별 read 플래그를 미리 심어 추후 '개별 읽음'으로 값싸게 승격 가능. 클릭→테이블 점프(필터에 가려지면 필터 자동 해제 + 안내). 갱신: backend/app/api/wire.py(alert에 eventId/occurredAt), docs/backend.md·docs/frontend.md §8. 브랜치 feat/alarm-dock."
    }
  ];

  /* ─── 렌더링 (수정 불필요) ─── */
  const STATUS_LABEL = { done: "확정", future: "예정", revisit: "재검토" };
  const tl = document.getElementById("timeline");
  let lastEra = null;
  DECISIONS.forEach((d, i) => {
    if (d.era !== lastEra) {
      const e = document.createElement("div");
      e.className = "era";
      e.textContent = d.era;
      tl.appendChild(e);
      lastEra = d.era;
    }
    const node = document.createElement("div");
    node.className = "node";
    node.dataset.status = d.status;
    node.dataset.filter = d.status;

    const alts = (d.alternatives || []).map(a =>
      `<span class="alt"><s>${a.name}</s> — ${a.rejected}</span>`).join("");

    node.innerHTML = `
      <div class="card">
        <div class="card-head">
          <div class="meta">
            <div class="when">${d.when}</div>
            <h3>${d.title}</h3>
          </div>
          <span class="badge ${d.status}">${STATUS_LABEL[d.status]}</span>
          <span class="caret">▸</span>
        </div>
        <div class="card-body"><div class="inner"><div class="body-pad">
          <div class="decision-line">${d.decision}</div>
          ${d.rationale ? `<div class="field"><div class="label">왜 (Rationale)</div><div class="val">${d.rationale}</div></div>` : ""}
          ${alts ? `<div class="field"><div class="label">대안 & 거절 이유</div><div class="alts">${alts}</div></div>` : ""}
          ${d.note ? `<div class="field"><div class="label">메모</div><div class="val">${d.note}</div></div>` : ""}
        </div></div></div>
      </div>`;
    node.querySelector(".card-head").addEventListener("click", () => node.classList.toggle("is-open"));
    if (i === DECISIONS.length - 1) node.classList.add("is-open");
    tl.appendChild(node);
  });

  /* ─── 필터 ─── */
  const active = new Set(["done", "future", "revisit"]);
  document.getElementById("legend").addEventListener("click", (ev) => {
    const chip = ev.target.closest(".chip");
    if (!chip) return;
    const f = chip.dataset.filter;
    if (active.has(f)) { active.delete(f); chip.setAttribute("aria-pressed", "false"); chip.classList.add("is-dimmed"); }
    else { active.add(f); chip.setAttribute("aria-pressed", "true"); chip.classList.remove("is-dimmed"); }
    document.querySelectorAll(".node").forEach(n =>
      n.classList.toggle("is-hidden", !active.has(n.dataset.filter)));
  });

  /* ─── 테마 토글 ─── */
  const body = document.body;
  const btn = document.getElementById("themeBtn");
  const saved = (() => { try { return localStorage.getItem("pholex-history-theme"); } catch { return null; } })();
  if (saved) body.dataset.theme = saved;
  const syncBtn = () => { btn.textContent = body.dataset.theme === "dark" ? "◐ Light" : "◑ Dark"; };
  syncBtn();
  btn.addEventListener("click", () => {
    body.dataset.theme = body.dataset.theme === "dark" ? "light" : "dark";
    try { localStorage.setItem("pholex-history-theme", body.dataset.theme); } catch {}
    syncBtn();
  });

  document.getElementById("updatedAt").textContent = "마지막 업데이트: " + LAST_UPDATED + " · 총 " + DECISIONS.length + "개 결정";
</script>
</body>
</html>
