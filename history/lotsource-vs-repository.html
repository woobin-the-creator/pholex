<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<style>
  html,body{margin:0;padding:0;background:#f4f6fb;}
  svg{font-family:-apple-system,"Apple SD Gothic Neo","Noto Sans KR",sans-serif;display:block;}
  .title{font-size:26px;font-weight:800;fill:#1a2233;}
  .sub{font-size:14px;fill:#5b6b8c;}
  .region{font-size:12px;font-weight:700;}
  .n-title{font-weight:800;}
  .n-sub{fill:#8a97b0;}
  .code{font-family:"SF Mono",ui-monospace,monospace;fill:#2447a8;}
  .flowlab{font-weight:700;}
  text{dominant-baseline:middle;}
</style>
</head>
<body>
<svg width="1200" height="690" viewBox="0 0 1200 690">
  <defs>
    <marker id="ah" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#2f6df6"/></marker>
    <marker id="ahKey" markerWidth="14" markerHeight="14" refX="7" refY="4.5" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L10,4.5 L0,9 Z" fill="#1f49b0"/></marker>
    <marker id="ahG" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#9aa6bd"/></marker>
    <marker id="ahO" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto" markerUnits="userSpaceOnUse">
      <path d="M0,0 L9,4 L0,8 Z" fill="#e08a3c"/></marker>
  </defs>

  <!-- Title -->
  <text x="36" y="40" class="title">데이터 플로우 — <tspan class="code" font-size="22">lot_status</tspan> 는 어떻게 화면까지 흐르나</text>
  <text x="36" y="70" class="sub">30분 dump가 lot_status를 채우고(확정), 슬롯1이 그걸 읽어 화면에 띄운다. 그 ‘읽기’를 어느 포트에 꽂을지가 이번 결정.</text>

  <!-- Regions -->
  <rect x="28" y="92" width="252" height="430" rx="14" fill="#edf0f6"/>
  <text x="44" y="114" class="region" fill="#7a87a0">레포 바깥 · 사내 소유</text>
  <rect x="296" y="92" width="876" height="430" rx="14" fill="#ffffff" stroke="#dce4f1" stroke-width="1.5"/>
  <text x="314" y="114" class="region" fill="#2f6df6">pholex  (앱 + DB)</text>

  <!-- ===== MAIN FLOW (blue solid) ===== -->
  <!-- arrows under nodes first -->
  <path d="M232,238 L320,238" stroke="#2f6df6" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <text x="276" y="222" text-anchor="middle" font-size="11.5" fill="#3a4a6b" class="flowlab">dump · 30분</text>
  <text x="276" y="254" text-anchor="middle" font-size="10" fill="#9aa6bd">사내 스케줄러</text>

  <path d="M478,238 L548,236" stroke="#1f49b0" stroke-width="4.5" fill="none" marker-end="url(#ahKey)"/>
  <text x="512" y="218" text-anchor="middle" font-size="12.5" fill="#1f49b0" class="flowlab">★ 내 hold 읽기</text>

  <path d="M726,238 L754,238" stroke="#2f6df6" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <path d="M876,238 L902,238" stroke="#2f6df6" stroke-width="3" fill="none" marker-end="url(#ah)"/>
  <path d="M982,238 L1006,238" stroke="#2f6df6" stroke-width="3" fill="none" marker-end="url(#ah)"/>

  <!-- node: MES -->
  <rect x="54" y="204" width="178" height="70" rx="12" fill="#ffffff" stroke="#c3ccdb" stroke-width="1.5"/>
  <text x="143" y="232" text-anchor="middle" font-size="15" class="n-title" fill="#1a2233">🏭 사내 MES</text>
  <text x="143" y="254" text-anchor="middle" font-size="11.5" class="n-sub">랏 원천 데이터</text>

  <!-- node: lot_status tank -->
  <rect x="326" y="198" width="152" height="82" rx="12" fill="#e8f8f1" stroke="#14b88a" stroke-width="2"/>
  <text x="402" y="224" text-anchor="middle" font-size="15" class="n-title code" fill="#0e7a5b">🛢 lot_status</text>
  <text x="402" y="246" text-anchor="middle" font-size="11" fill="#5e9e86">30분 dump</text>
  <text x="402" y="262" text-anchor="middle" font-size="11" fill="#5e9e86">마스터 캐시</text>

  <!-- node: lot_dump_meta -->
  <rect x="326" y="294" width="152" height="46" rx="10" fill="#fff4e9" stroke="#f0a868" stroke-width="1.5"/>
  <text x="402" y="311" text-anchor="middle" font-size="11.5" font-weight="700" fill="#c9772f">⏱ lot_dump_meta</text>
  <text x="402" y="327" text-anchor="middle" font-size="10" class="code" fill="#c9924f">last_run_at</text>

  <!-- node: PORT (decision) -->
  <rect x="552" y="182" width="174" height="112" rx="16" fill="#f3f7ff" stroke="#2f6df6" stroke-width="2.5"/>
  <rect x="552" y="166" width="96" height="26" rx="13" fill="#2f6df6"/>
  <text x="600" y="180" text-anchor="middle" font-size="12" font-weight="700" fill="#ffffff">(A) 추천 ✓</text>
  <text x="639" y="216" text-anchor="middle" font-size="15.5" class="n-title" fill="#1f49b0">🔌 LotSource 포트</text>
  <text x="639" y="240" text-anchor="middle" font-size="12.5" class="code">fetch_my_holds()</text>
  <text x="639" y="270" text-anchor="middle" font-size="11.5" fill="#9aa6bd">↔ 대안 (B) LotRepository</text>

  <!-- node: usecase -->
  <rect x="756" y="204" width="120" height="70" rx="12" fill="#ffffff" stroke="#c3ccdb" stroke-width="1.5"/>
  <text x="816" y="232" text-anchor="middle" font-size="13.5" class="n-title" fill="#1a2233">⚙️ usecase</text>
  <text x="816" y="253" text-anchor="middle" font-size="10.5" class="n-sub">내 hold 조회</text>

  <!-- node: wire -->
  <rect x="904" y="210" width="78" height="58" rx="10" fill="#ffffff" stroke="#c3ccdb" stroke-width="1.5"/>
  <text x="943" y="234" text-anchor="middle" font-size="12.5" class="n-title" fill="#1a2233">🔄 wire</text>
  <text x="943" y="251" text-anchor="middle" font-size="9.5" class="n-sub">camelCase</text>

  <!-- node: screen -->
  <rect x="1008" y="198" width="150" height="82" rx="12" fill="#eef3ff" stroke="#3f6df6" stroke-width="1.5"/>
  <text x="1083" y="226" text-anchor="middle" font-size="14" class="n-title" fill="#27408f">🖥️ 슬롯1 화면</text>
  <text x="1083" y="248" text-anchor="middle" font-size="11" class="n-sub">내 lot hold</text>

  <!-- ===== FUTURE: realtime API (gray dashed) ===== -->
  <rect x="54" y="400" width="178" height="64" rx="12" fill="#f4f6fb" stroke="#aeb9cd" stroke-width="1.5" stroke-dasharray="5,4"/>
  <text x="143" y="426" text-anchor="middle" font-size="13.5" font-weight="700" fill="#8a97b0">⏳ 실시간 API</text>
  <text x="143" y="447" text-anchor="middle" font-size="11" fill="#aab4c6">사내 미구현</text>
  <path d="M232,428 C 400,428 470,330 622,296" stroke="#9aa6bd" stroke-width="2.5" fill="none" stroke-dasharray="6,5" marker-end="url(#ahG)"/>
  <text x="430" y="372" text-anchor="middle" font-size="11.5" fill="#8a97b0" class="flowlab">나중에 같은 포트에 갈아끼움</text>
  <text x="430" y="390" text-anchor="middle" font-size="10.5" fill="#aab4c6">(usecase·wire·화면 무변경)</text>

  <!-- ===== HEALTH: not carried (orange dashed) ===== -->
  <path d="M460,338 C 620,452 880,452 1010,372" stroke="#e08a3c" stroke-width="2.5" fill="none" stroke-dasharray="6,5"/>
  <!-- X mark before screen -->
  <line x1="998" y1="382" x2="1014" y2="398" stroke="#d9534f" stroke-width="3"/>
  <line x1="1014" y1="382" x2="998" y2="398" stroke="#d9534f" stroke-width="3"/>
  <text x="700" y="468" text-anchor="middle" font-size="11.5" fill="#cf7430" class="flowlab">신선도(last_run_at)는 이 포트로 안 흐른다 — 🟡/🔴 신호등은 별도 포트 필요(다음 질문)</text>

  <!-- ===== Legend ===== -->
  <line x1="320" y1="552" x2="352" y2="552" stroke="#2f6df6" stroke-width="3"/>
  <text x="360" y="553" font-size="11.5" fill="#3a4a6b">확정 — 현재 흐름(dump 경유)</text>
  <line x1="590" y1="552" x2="622" y2="552" stroke="#9aa6bd" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="630" y="553" font-size="11.5" fill="#3a4a6b">미구현 — 실시간 API</text>
  <line x1="810" y1="552" x2="842" y2="552" stroke="#e08a3c" stroke-width="2.5" stroke-dasharray="6,5"/>
  <text x="850" y="553" font-size="11.5" fill="#3a4a6b">별도 결정 — 신선도(health)</text>

  <!-- ===== Recommendation strip ===== -->
  <rect x="28" y="588" width="1144" height="72" rx="12" fill="#f5f8ff" stroke="#c5d6ff" stroke-width="1.5"/>
  <text x="50" y="616" font-size="13.5" font-weight="800" fill="#1f49b0">추천 (A) — LotSource 포트에 lot_status 읽기를 꽂는다</text>
  <text x="50" y="640" font-size="12.5" fill="#3a4a6b">같은 콘센트(포트)에 지금은 dump-읽기 어댑터를, 실시간 API가 생기면 그 어댑터로 갈아끼운다 → 위 파란 흐름(usecase·wire·화면)은 한 줄도 안 바뀐다.</text>
</svg>
</body>
</html>
